<!DOCTYPE html>
<html>
<head>
<title>Cricket Quiz Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop>
<source src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3">
</audio>

<audio id="questionSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-interface-click-1126.mp3">
</audio>

<div id="startScreen" class="start">

<h1>🏏 Cricket Quiz</h1>

<p>Test your cricket knowledge</p>

<button class="startBtn" onclick="startQuiz()">Start Quiz</button>

</div>

<div class="container" id="quizContainer">

<div class="top">

<div>⏱ <span id="time">15</span>s</div>

<div>Score: <span id="score">0</span></div>

<div>Level: <span id="level">Easy</span></div>

<div><span id="qnum">1</span>/10</div>

</div>

<div class="progress">
<div id="progress-bar"></div>
</div>

<h2 id="question"></h2>

<div id="answers"></div>

<h2 id="result"></h2>

<div id="celebration"></div>

<button class="restart" onclick="restartQuiz()">Restart Quiz</button>

</div>

<script src="script.js"></script>

</body>
</html>
